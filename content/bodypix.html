<script>

  let bodypix;
  let segmentation;
  let img;

  const options = {
    multiplier: 0.75,
    outputStride: 16, // 8, 16, or 32, default is 16
    segmentationThreshold: 0.5, // 0 - 1, defaults to 0.5
  };

  function preload() {
      img = loadImage('/images/fashion/7df33e7efeac335dec0953.jpg');
      bodypix = ml5.bodyPix(options);
  }

  function setup() {
      createCanvas(600, 400);
      //bodypix.segment(img, gotResults);
      createHSBPalette();

      bodypix.segmentWithParts(img, gotResults, options);


      background("#ff0000");
  }

  function gotResults(err, result) {
      if (err) {
          console.log(err);
          return
      }

      segmentation = result;

      background(0);
      image(segmentation.partMask, 0, 0, width, height);


  }

  function createHSBPalette() {
    colorMode(HSB);
    options.palette = bodypix.config.palette;
    Object.keys(options.palette).forEach(part => {
        // const h = floor(random(360));
        // const s = floor(random(100));
        // const b = floor(random(100));
        // const c = color(h, s, b);
        // options.palette[part].color = c;
        if (part == "leftFace") {
            options.palette[part].color = color(0,0,0);
        } else {
            options.palette[part].color = color(0,0,100);
        }
        
    });
    console.log(options.palette);
}  

</script>
