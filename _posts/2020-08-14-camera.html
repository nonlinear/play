<a href="https://www.youtube.com/playlist?list=PLRqwX-V7Uu6YPSwT06y_AEYTqIwbeam3y">webcam image classification</a>.
<script>
	let mobilenet;
	let video;
	let label = '';

	function modelReady() {
		console.log('Model is Ready!!!');
		mobilenet.predict(gotResults);
	}

	function gotResults(error, results) {
		if (error) {
			console.error(error);
		} else {
			console.log(results);
			label = results[0].label;


			mobilenet.predict(gotResults);
		}
	}


	function setup() {
		createCanvas(windowWidth, windowHeight);
		video = createCapture(VIDEO);
		video.hide();

		

		mobilenet = ml5.imageClassifier('MobileNet', video, modelReady); //continually hook up video

	}
	function draw(){
		background(0);
		image(video, 0, 50, width, width * .66);
		fill(200);
		textSize(20);
		text('MobileNet sees a', 10, 30);
		text(label, 170, 30);
		textSize(40);
		text('🤖', width - 45, 40);
	}
</script>
