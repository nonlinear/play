<p>playing with my illustrations, plus p5js</p>

<style>
	{% include styles/card.css %}
	canvas {
		padding 20px;
	}
</style>
<script>
	let layers = [];
	let illustration = "brat";
	let layerNum = 5;
	let parallax = 5;
	function preload(){
		for (var i = 1; i <= layerNum; i++) {
			layers.push(loadImage('/assets/images/illustrations/' + illustration + '0' + i + '.png'));
		}
	}
	function setup() {
		createCanvas(500, 500);
	}
	function draw() {
		background(243, 228, 176);

		for (var i = 0; i < layerNum; i++) {
			let dx = map(mouseX, 0, width, -i * parallax, i * parallax);
			let dy = map(mouseY, 0, height, -i * parallax, i * parallax);
			image(layers[i], dx, dy, width, height);
		}

		// image 1, move parallax * 0
		// image 2, move parallax * 1
		//
		
	}
</script>
