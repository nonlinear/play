<script>
	function setup() {
  createCanvas(windowWidth, windowHeight);
}

function draw() {
	let circle = windowWidth / 3;
	background(mouseX/2);
	fill(width-mouseX);
	noStroke();
	ellipse(mouseX, mouseY, circle, circle);
}
</script>
