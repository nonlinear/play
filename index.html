---
layout: default
title: home
categories: home
---


{% for category in site.categories %}
  <h5>{{ category | first }}</h5>
    <ul>
    {% for post in category.last %}
     {% if post.status contains "public" %}
        <li><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></li>
        {% endif %}
    {% endfor %}
    </ul>
{% endfor %}
