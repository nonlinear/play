---
layout: default
title: home
categories: article
switches: header, style, bootstrap, favicon, open-graph
---
<div class="categories">
{% for category in site.categories %}
<div class="category">
  <h3>{{ category | first }}</h3>
    <ul>
    {% for post in category.last %}
      <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
    </ul>
    </div>
{% endfor %}
</div>
