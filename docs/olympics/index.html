function setup() {

	var olympics = dataOlympics.olympics.summer;
	for (var i = 0; i < olympics.length; i++) {
		collapsewrapper.html(collapsecity(olympics[i]), true);
	};
}

function collapsecity(element) {
	html = '<li><h2>'+ element.city + ', ' + element.year + ' </h2>';
	html += '<p class="watch">' + element.countries + ' countries played with ' + element.athletes + ' athletes total.</p>';
	html += '<a data-toggle="popover" title="Popover title" data-html="true" data-content="Popover content" data-placement="top">Popover trigger</a></li>';
	return html;
}

  <script>
    $(function () {
      $('[data-toggle="tooltip"]').tooltip()
    });
    $('[data-toggle="popover"]').popover({ trigger: "manual" , html: true, animation:false, content: ''})
    .on("mouseenter", function () {
      var _this = this;
      $(this).popover("show");
      $(".popover").on("mouseleave", function () {
        $(_this).popover('hide');
      });
    }).on("mouseleave", function () {
      var _this = this;
      setTimeout(function () {
        if (!$(".popover:hover").length) {
          $(_this).popover("hide");
        }
      }, 300);
    });
  </script>
