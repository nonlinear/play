<!--   
  If browser tem a funcao
    if server tem permissao
      nada
    else server nao tem a funcao
      #request
  else browser nao tem a funcao
    #sorry
     -->

 <!--    
 -->
 
 <script>
 	let button;
 	let motionSupport;
 	let motionGranted;

 	function setup() {
 		createCanvas(windowWidth, windowHeight);

 		if (typeof(DeviceOrientationEvent) !== 'undefined' && typeof(DeviceOrientationEvent.requestPermission) === 'function') {
 			motionSupport = true;
 			button = createButton('click to allow access to sensors');
 			button.mousePressed( requestAccess );

 		}
 		else {
 			motionSupport = false;
 		}
 	}

 	function requestAccess() {
 		DeviceOrientationEvent.requestPermission() 
 		.then(response => {
 			if (response == 'granted') {
 				motionGranted = true;
 			} else {
 				motionGranted = false;
 			}

 		})
 		.catch(console.error);
 	}

 	function draw() {
 		
  if (motionSupport) {
  	if (motionGranted) {
  		text("yay!", 100, 100);

  	} else {
  		text("fuck you", 100, 100);
  	}

  } else {
  	text("sorry loser", 100, 100);
  }

}

</script>
