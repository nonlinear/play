<script>
let R0;

function setup() {
  createCanvas(1000, 1000);
}

function draw() {
  background(0);
  R0 = 0.26 * width;
  if (R0 <= 0)
    noLoop();
  translate(width/2, width/2);
  let inc = .005;
  noStroke();
  
for (let i=0; R0 > 20; i++) {
	R0 -= 10;
	fill(255 * (i % 2));
	beginShape();
	for (let a = 0; a <= TWO_PI; a += inc) {
		let r - min(1 / abs(sin(a)), 1 / abs(cos(a)));
		let f = 2;
		let R = R0 + noise((1 + sin(a)) * f, (1 + cos(a)) * f) * R0;
		let x = R * r * sin(a);
		let y = R * r * cos(a);
		vertex(x, y);
	}
	endShape(CLOSE);
	
}
}
</script>
