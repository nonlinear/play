<script>
	let angle = 0;
	function setup() {
		createCanvas(800, 800, WEBGL);
		angleMode(DEGREES);
	}
	function draw() {
		background(0);
		push();
		rotateX(angle);
		rotateY(angle / 2);
		rotateZ(angle / 1.5);
		for (let i = 0; i < 5; i++) {
				let x map(i, 0, 5, -250, 250);
			for (let j = 0; j < 5; j++) {
				let y map(j, 0, 5, -250, 250);
			for (let k = 0; k < 5; k++) {
				let z map(k, 0, 5, -250, 250);
			push();
			translate(x, y, z);
			let r = map(i, 0, 5, 0, 255)
			let g = map(j, 0, 5, 0, 255)
			let b = map(k, 0, 5, 0, 255)
			emissiveMaterial(r, g, b);
			box(70);
			pop();
		}
	}
}
pop();
angle++;
}
</script>
