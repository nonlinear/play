body, html {
  height: 100%;
  display: grid;

  margin: auto;

<script>
	// Grid for p5js
// version 1.0.1

function Grid(cellNumber,gap) {
  this.cellNumber = cellNumber;
  this.gap = gap;
  this.width = (width-((this.cellNumber-1)*this.gap))/this.cellNumber;
  this.cells = [];
  for (let i = 0; i < this.cellNumber; i++) {
    this.cells[i] = [];
  }
  
  
  this.show = function() {
    for (let j = 0; j < this.cellNumber; j++) {
      let heightPointer = 0;      
      for (let i = 0; i < this.cells[j].length; i++) {
        if (heightPointer + this.cells[j][i].height() < height) {
          push();
          translate(this.cellPosition(j),heightPointer);
          heightPointer += this.cells[j][i].height();    
          this.cells[j][i].show();
          pop();
        }
      }    
    }
    
  }
  
  this.stack = function(n, elem) {
    this.cells[n].push(elem);    
  }
  
  this.cellPosition = function(n) {
    return this.width*n+this.gap*n;
  }
  
}
	function setup() {
		createCanvas(400, 584);
		grid1 = new Grid(2,10);
		text1 = new Title("Lorem ipsum, dolor, sit amet consectetur adipisicing elit. Praesentium perferendis explicabo modi fugit nostrum ex minus sit velit at impedit.");
	}
	function draw() {
		background(255);
		grid1.show();
		grid1.stack(0,text1);
		fill(0,0,0);

	}
	function Title(text) {
		this.height = function() {
			return 50;
		}
		this.text = text;
		this.show = function() {
			push();
			textSize(40);
			textAlign(LEFT, TOP);
			text(this.text, 10, 10, 300);
			pop();
		}
	}
</script>
