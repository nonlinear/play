       <p>I feel I need to concentrate in typography first, because p5 is very rudimentary... objects are just there, without relationship with one another, if you don't specify.</p>
<p>or i dunno, cheat adding html <em>inside</em> p5 canvas.</p>
<p>fonts used are <a href="../assets/fonts/SpaceGrotesk-Regular.woff">Space Grotesk</a> and <a href="../assets/fonts/RenoMono.ttf">RenoMono</a>
</p>
<script>
	let = grotesk;
	let = renomono;

function preload() {
	grotesk = loadFont('../assets/fonts/SpaceGrotesk-Regular.woff');
	renomono = loadFont('../assets/fonts/RenoMono.ttf');
}

function setup() {
	createCanvas(windowWidth, windowHeight);
	background(0);
}

function draw() {
	fill(255);
	stroke(0);
	textSize(70);
	textFont(grotesk);
	text('Space Grotesk', 200, 200);
	textFont(renomono);
	text('RenoMono', 200, (200 + 100));

}
</script>
