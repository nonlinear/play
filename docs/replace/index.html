   <style>
	.grid {
		margin: 30px;
		display: grid;
		grid-gap: 20px;
		grid-template-columns: repeat(4, 1fr);
		grid-template-rows: masonry;
	}
	.cell {
		background-color: rgba(255,255,255,.4);
		border-radius: 10px;
		padding: 20px;
		transition: all 300ms ease-out;
	}
	.cell:hover {
		background-color: rgba(255,255,255,.9);
	}
	.otherthing {
		border: solid 1px red;
	}
	.otherthing.another {
		border: dashed 3px blue;
	}
</style>
<div class="container">
	<h1>Olympics</h1>

<script>
	var dataOlympics;
	function preload(){
		dataOlympics = loadJSON('/assets/data/sports/olympics.json');
	}
	function replaceString(initialString, finalString, target) {
    if(!target) {
      var watch = selectAll(".replaceString");
    } else {
      var watch = selectAll(target);
    }
    for (var i = 0; i < watch.length; i++) {
     var target = watch[i].html();
     var targetResult = target.replaceAll(initialString, finalString);
     watch[i].html(targetResult, false);
   }
 }
	function setup() {
		noCanvas();
		var collapsewrapper = select(".grid");
		var olympics = dataOlympics.olympics.summer;
		for (var i = 0; i < olympics.length; i++) {
			collapsewrapper.html(collapsecity(olympics[i]), true);
		};
		replaceString('athletes', '<a class="vocabulary" href="https://en.wikipedia.org/wiki/Special:search/athletes">athletes</a>');
		
	}

	function collapsecity(element) {
		html = '<div class="cell"><h3>'+ element.city + ', ' + element.year + ' </h3>';
		html += '<p class="replaceString">athletes ' + element.countries + ' countries played with ' + element.athletes + ' athletes total. second athletes.</p></div>';
	
		return html;
	}

	}


</script>

  <script>
    $(function () {
      $('[data-toggle="tooltip"]').tooltip()
    });
    $('[data-toggle="popover"]').popover({ trigger: "manual" , html: true, animation:false, content: ''})
    .on("mouseenter", function () {
      var _this = this;
      $(this).popover("show");
      $(".popover").on("mouseleave", function () {
        $(_this).popover('hide');
      });
    }).on("mouseleave", function () {
      var _this = this;
      setTimeout(function () {
        if (!$(".popover:hover").length) {
          $(_this).popover("hide");
        }
      }, 300);
    });
  </script>
